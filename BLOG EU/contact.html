<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - Gabriel Martinelli</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <div class="nav-inner">
            <a class="nav-logo" href="index.html">gab.dev</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">Sobre Mim</a></li>
                <li><a href="curriculum.html">Currículo</a></li>
                <li><a href="receitas.html">Receitas</a></li>
                <li><a href="contact.html" class="active">Contato</a></li>
            </ul>
            <div class="nav-controls">
                <button class="btn-icon" onclick="diminuirFonte()">A-</button>
                <button class="btn-icon" onclick="aumentarFonte()">A+</button>
                <button class="btn-icon" onclick="mudarTema()">🌓</button>
            </div>
        </div>
    </header>

    <main class="container page-content">
        <h2>Contato</h2>
        <p class="subtitle-page">Mande um feedback ou entre em contato profissional</p>

        <div class="contact-flex">
            <div class="contact-form-box">
                <form onsubmit="alert('Mensagem enviada com sucesso!'); return false;">
                    <div class="form-group">
                        <label for="nome">Nome:</label>
                        <input type="text" id="nome" required placeholder="Seu nome">
                    </div>
                    <div class="form-group">
                        <label for="email">E-mail:</label>
                        <input type="email" id="email" required placeholder="Seu e-mail">
                    </div>
                    <div class="form-group">
                        <label for="msg">Mensagem:</label>
                        <textarea id="msg" rows="4" required placeholder="Sua mensagem..."></textarea>
                    </div>
                    <button type="submit" class="btn-submit">Enviar</button>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Gabriel Martinelli da Silva – Sarandi, RS</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
